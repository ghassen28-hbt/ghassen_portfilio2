name: Sync GitHub Projects

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - main
    paths:
      - scripts/sync-github-projects.mjs
      - .github/workflows/sync-github-projects.yml

permissions:
  contents: write

jobs:
  sync-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync GitHub projects snapshot
        env:
          GITHUB_USERNAME: ${{ vars.PORTFOLIO_GITHUB_USERNAME || 'ghassen28-hbt' }}
          GITHUB_INCLUDE_FORKS: ${{ vars.PORTFOLIO_GITHUB_INCLUDE_FORKS || 'false' }}
          GITHUB_TOKEN: ${{ secrets.PORTFOLIO_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: npm run sync:projects

      - name: Verify production build
        run: npm run build

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/github-projects.json
          if git diff --cached --quiet; then
            echo "No project snapshot changes detected."
            exit 0
          fi
          git commit -m "chore: sync GitHub projects"
          git push
